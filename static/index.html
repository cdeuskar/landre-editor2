// ── Stage 3: road dialog + buffer ────────────────────────────────────────────

function openRoadDialog(verts) {
  const roadCount = Object.values(STATE.editableParcels).filter(p => p.type === 'Road').length;
  document.getElementById('rdlg-name').value  = `Road ${String.fromCharCode(65 + roadCount)}`;
  document.getElementById('rdlg-width').value = '6';
  document.getElementById('road-dialog').classList.add('open');
  STATE.pendingRoadVerts = verts;
}

function confirmRoadDialog() {
  const name  = document.getElementById('rdlg-name').value.trim();
  const width = parseFloat(document.getElementById('rdlg-width').value);
  document.getElementById('road-dialog').classList.remove('open');
  if (!name || !(width > 0) || !STATE.pendingRoadVerts) return;
  const verts = STATE.pendingRoadVerts;
  STATE.pendingRoadVerts = null;
  applyRoadBuffer(verts, name, width);
}

function cancelRoadDialog() {
  document.getElementById('road-dialog').classList.remove('open');
  STATE.pendingRoadVerts = null;
}

function applyRoadBuffer(verts, name, widthM) {
  const coords = verts.map(ll => [ll.lng, ll.lat]);
  const line   = turf.lineString(coords);
  let buffered = turf.buffer(line, widthM / 2, { units: 'meters' });
  if (!buffered) return;

  // Flatten MultiPolygon → largest Polygon
  if (buffered.geometry.type === 'MultiPolygon') {
    let best = null, bestArea = 0;
    buffered.geometry.coordinates.forEach(rings => {
      const poly = turf.polygon(rings);
      const a    = turf.area(poly);
      if (a > bestArea) { bestArea = a; best = poly; }
    });
    if (!best) return;
    buffered = best;
  }

  // Clip to project boundary if one exists
  if (STATE.projectBoundaryGeojson) {
    const clipped = turf.intersect(buffered, STATE.projectBoundaryGeojson);
    if (clipped && clipped.geometry.type === 'Polygon') buffered = clipped;
  }

  const latlngs = coordsToLatLngs(buffered.geometry.coordinates);
  if (latlngs.length < 3) return;

  pushHistory();
  const id = generateId();
  STATE.editableParcels[id] = {
    id, name, type: 'Road', latlngs, originalId: null,
    roadVerts: verts.map(ll => L.latLng(ll.lat, ll.lng)),
    roadWidth: widthM,
  };
  refreshEditableLayer();
  computeStats();
}

// ── Stage 3: select / deselect / handles ──────────────────────────────────────

function handlePolygonClick(id, e) {
  if (document.getElementById('edge-popup').classList.contains('open')) { closeEdgePopup(); return; }
  if (_edgeOpState) {
    const ref = findNearestEdge(e.latlng);
    if (ref) applyEdgeOp(ref.parcelId, ref.edgeIdx);
    return;
  }
  if (STATE.activeTool === 'select') {
    const shift = e.originalEvent?.shiftKey;
    if (shift) {
      // Toggle this parcel in the selection set
      if (STATE.selectedIds.has(id)) {
        STATE.selectedIds.delete(id);
        if (STATE.lastSelectedId === id)
          STATE.lastSelectedId = STATE.selectedIds.size > 0
            ? [...STATE.selectedIds].at(-1) : null;
        refreshEditableLayer();
        if (STATE.selectedIds.size === 1) renderVertexHandles(STATE.lastSelectedId);
        else { STATE.vertexLG.clearLayers(); document.getElementById('vhandles').innerHTML = ''; }
        syncTableSelection();
      } else {
        STATE.selectedIds.add(id);
        STATE.lastSelectedId = id;
        refreshEditableLayer();
        if (STATE.selectedIds.size === 1) renderVertexHandles(id);
        else { STATE.vertexLG.clearLayers(); document.getElementById('vhandles').innerHTML = ''; }
        syncTableSelection();
      }
    } else {
      // No shift: deselect if it's the only selected, otherwise select only this one
      if (STATE.selectedIds.has(id) && STATE.selectedIds.size === 1) deselectAll();
      else selectPolygon(id);
    }
  } else if (STATE.activeTool === 'delete') {
    deletePolygon(id);
  }
}

function selectPolygon(id) {
  STATE.selectedIds    = new Set([id]);
  STATE.lastSelectedId = id;
  refreshEditableLayer();
  renderVertexHandles(id);
  syncTableSelection();
  scrollRowIntoView(id);
}

function deselectAll() {
  STATE.selectedIds    = new Set();
  STATE.lastSelectedId = null;
  _vertexMarkers = [];
  STATE.vertexLG.clearLayers();
  document.getElementById('vhandles').innerHTML = '';
  refreshEditableLayer();
  syncTableSelection();
}

function renderVertexHandles(id) {
  const container = document.getElementById('vhandles');
  container.innerHTML = '';
  _vertexMarkers = [];
  const p = STATE.editableParcels[id];
  if (!p) return;

  // Roads use a dedicated handle mode: only centerline waypoints are editable
  if (p.type === 'Road') {
    if (p.roadVerts) renderRoadHandles(id);
    return;
  }

  function placeHandle(ll, cls, onDown) {
    const pt  = map.latLngToContainerPoint(ll);
    const div = document.createElement('div');
    div.className = cls;
    div.style.left = pt.x + 'px';
    div.style.top  = pt.y + 'px';
    div._ll = ll;
    div.addEventListener('mousedown', e => {
      e.stopPropagation();
      e.preventDefault();
      map.dragging.disable();
      onDown(div, e);
    });
    div.addEventListener('click', e => e.stopPropagation());
    container.appendChild(div);
    return div;
  }

  p.latlngs.forEach((ll, idx) => {
    const div = placeHandle(ll, 'vhandle-v', d => startVertexDrag(id, idx, d));
    div.addEventListener('contextmenu', e => {
      e.preventDefault();
      e.stopPropagation();
      if (p.latlngs.length <= 3) return;
      pushHistory();
      p.latlngs.splice(idx, 1);
      renderVertexHandles(id);
      refreshEditableLayer();
      computeStats();
    });
    _vertexMarkers.push(div);
  });

  const n = p.latlngs.length;
  for (let i = 0; i < n; i++) {
    const a   = p.latlngs[i];
    const b   = p.latlngs[(i + 1) % n];
    const mid = L.latLng((a.lat + b.lat) / 2, (a.lng + b.lng) / 2);
    placeHandle(mid, 'vhandle-m', (d, e) => startEdgeDragOrInsert(id, i, mid, d, e));
  }
}

// ── Stage 3: parcel body drag ─────────────────────────────────────────────────

function startParcelDrag(id, downEvent) {
  if (STATE.activeTool !== 'select') return;
  const p = STATE.editableParcels[id];
  if (!p) return;
  closeEdgePopup();

  const _container  = map.getContainer();
  const rect        = _container.getBoundingClientRect();
  const startClientX = downEvent.clientX;
  const startClientY = downEvent.clientY;
  const startLL      = map.containerPointToLatLng(
    L.point(startClientX - rect.left, startClientY - rect.top)
  );
  const startLatlngs  = p.latlngs.map(ll => ({ lat: ll.lat, lng: ll.lng }));
  const startRoadVerts = p.roadVerts ? p.roadVerts.map(ll => ({ lat: ll.lat, lng: ll.lng })) : null;

  let _moved = false;
  map.dragging.disable();

  function onMove(e) {
    const dx = e.clientX - startClientX;
    const dy = e.clientY - startClientY;
    if (!_moved && Math.hypot(dx, dy) < 3) return;
    if (!_moved) {
      pushHistory();
      // Force-select this parcel and clear vertex handles during drag
      if (!STATE.selectedIds.has(id)) {
        STATE.selectedIds    = new Set([id]);
        STATE.lastSelectedId = id;
      }
      document.getElementById('vhandles').innerHTML = '';
      _vertexMarkers = [];
      _moved = true;
    }

    const curLL = map.containerPointToLatLng(
      L.point(e.clientX - rect.left, e.clientY - rect.top)
    );
    const dLat = curLL.lat - startLL.lat;
    const dLng = curLL.lng - startLL.lng;
    p.latlngs = startLatlngs.map(s => L.latLng(s.lat + dLat, s.lng + dLng));
    if (startRoadVerts) p.roadVerts = startRoadVerts.map(s => L.latLng(s.lat + dLat, s.lng + dLng));

    refreshEditableLayer();
    computeStats();
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    map.dragging.enable();

    if (!_moved) return; // no drag — let the click event fire normally

    _parcelJustDragged = true;
    _justDragged = true;
    setTimeout(() => { _justDragged = false; }, 50);
    if (STATE.selectedIds.size === 1 && STATE.selectedIds.has(id)) {
      renderVertexHandles(id);
    }
    computeStats();
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
}

// ── Stage 3: vertex drag ──────────────────────────────────────────────────────

function startVertexDrag(id, idx, marker) {
  closeEdgePopup();
  dragState = { id, idx };
  map.dragging.disable();
  let _moved = false;
  const _container = map.getContainer();

  function onMove(e) {
    if (!_moved) pushHistory();
    _moved = true;
    const p = STATE.editableParcels[id];
    if (!p) return;
    const rect   = _container.getBoundingClientRect();
    const x      = e.clientX - rect.left;
    const y      = e.clientY - rect.top;
    const rawLL  = map.containerPointToLatLng(L.point(x, y));
    const snapLL = findSnapVertex(rawLL, { parcelId: id, vertexIdx: idx });
    const ll     = snapLL || rawLL;
    updateSnapMarker(snapLL);
    p.latlngs[idx] = ll;
    if (marker && marker.parentNode) {
      const pt = snapLL ? map.latLngToContainerPoint(snapLL) : L.point(x, y);
      marker.style.left = pt.x + 'px';
      marker.style.top  = pt.y + 'px';
      marker._ll = ll;
    }
    refreshEditableLayer();
    computeStats();
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    dragState = null;
    map.dragging.enable();
    updateSnapMarker(null);
    if (_moved) {
      _justDragged = true;
      setTimeout(() => { _justDragged = false; }, 50);
      renderVertexHandles(id);
      computeStats();
    }
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
}

// ── Stage 3: edge drag ────────────────────────────────────────────────────────

function startEdgeDragOrInsert(id, edgeIdx, midLatLng, marker, downEvent) {
  const p = STATE.editableParcels[id];
  if (!p) return;

  if (_edgeOpState) { applyEdgeOp(id, edgeIdx); return; }

  const _container = map.getContainer();
  const rect       = _container.getBoundingClientRect();
  const startClientX = downEvent.clientX;
  const startClientY = downEvent.clientY;
  const startLL = map.containerPointToLatLng(
    L.point(startClientX - rect.left, startClientY - rect.top)
  );

  const n    = p.latlngs.length;
  const idxA = edgeIdx % n;
  const idxB = (edgeIdx + 1) % n;
  const startA = { lat: p.latlngs[idxA].lat, lng: p.latlngs[idxA].lng };
  const startB = { lat: p.latlngs[idxB].lat, lng: p.latlngs[idxB].lng };

  let _moved = false;

  function onMove(e) {
    const dx = e.clientX - startClientX;
    const dy = e.clientY - startClientY;
    if (!_moved && Math.hypot(dx, dy) < 3) return;
    if (!_moved) { pushHistory(); _moved = true; }

    const curLL = map.containerPointToLatLng(
      L.point(e.clientX - rect.left, e.clientY - rect.top)
    );
    const dLat = curLL.lat - startLL.lat;
    const dLng = curLL.lng - startLL.lng;

    p.latlngs[idxA] = L.latLng(startA.lat + dLat, startA.lng + dLng);
    p.latlngs[idxB] = L.latLng(startB.lat + dLat, startB.lng + dLng);

    // Keep vertex handles in sync during drag
    if (_vertexMarkers[idxA]) {
      const ptA = map.latLngToContainerPoint(p.latlngs[idxA]);
      _vertexMarkers[idxA].style.left = ptA.x + 'px';
      _vertexMarkers[idxA].style.top  = ptA.y + 'px';
    }
    if (_vertexMarkers[idxB]) {
      const ptB = map.latLngToContainerPoint(p.latlngs[idxB]);
      _vertexMarkers[idxB].style.left = ptB.x + 'px';
      _vertexMarkers[idxB].style.top  = ptB.y + 'px';
    }

    // Keep the edge handle at the new midpoint
    const midPt = map.latLngToContainerPoint(
      L.latLng((p.latlngs[idxA].lat + p.latlngs[idxB].lat) / 2,
               (p.latlngs[idxA].lng + p.latlngs[idxB].lng) / 2)
    );
    marker.style.left = midPt.x + 'px';
    marker.style.top  = midPt.y + 'px';

    refreshEditableLayer();
    computeStats();
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    map.dragging.enable();

    if (!_moved) {
      showEdgePopup(id, edgeIdx, midLatLng, downEvent.clientX, downEvent.clientY);
      return;
    }

    _justDragged = true;
    setTimeout(() => { _justDragged = false; }, 50);
    renderVertexHandles(id);
    computeStats();
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
}

// ── Stage 3: insert / delete ──────────────────────────────────────────────────

function insertVertexAndDrag(id, beforeIdx, latlng) {
  const p = STATE.editableParcels[id];
  if (!p) return;
  pushHistory();
  p.latlngs.splice(beforeIdx, 0, L.latLng(latlng.lat, latlng.lng));
  renderVertexHandles(id);
  refreshEditableLayer();
  computeStats();
  // Chain straight into dragging the new vertex
  const newMarker = _vertexMarkers[beforeIdx];
  if (newMarker) startVertexDrag(id, beforeIdx, newMarker);
}

function deletePolygon(id) {
  if (!STATE.editableParcels[id]) return;
  pushHistory();
  delete STATE.editableParcels[id];
  if (STATE.selectedIds.has(id)) {
    STATE.selectedIds.delete(id);
    if (STATE.lastSelectedId === id)
      STATE.lastSelectedId = STATE.selectedIds.size > 0 ? [...STATE.selectedIds].at(-1) : null;
    STATE.vertexLG.clearLayers();
    document.getElementById('vhandles').innerHTML = '';
  }
  refreshEditableLayer();
  computeStats();
}

// ── Stage 3: change type (called from stats table dropdown) ───────────────────

function changeParcelType(id, type) {
  const p = STATE.editableParcels[id];
  if (!p) return;
  pushHistory();
  p.type = type;
  refreshEditableLayer();
  if (STATE.selectedIds.has(id) && STATE.selectedIds.size === 1) renderVertexHandles(id);
  computeStats();
}

// ── Stage 3: tracing mode ─────────────────────────────────────────────────────

function startTracing() {
  STATE.origLG.clearLayers();
  STATE.boundaryLG.clearLayers();
  STATE.editLG.clearLayers();
  STATE.vertexLG.clearLayers();
  document.getElementById('vhandles').innerHTML = '';
  STATE.originalFeatures = [];
  STATE.editableParcels  = {};
  STATE.selectedIds      = new Set();
  STATE.lastSelectedId   = null;
  cancelDraw();

  STATE.tracingMode = true;
  STATE.activeTool  = 'draw';
  document.getElementById('map').classList.add('drawing-cursor');
  document.getElementById('btn-trace').style.display        = 'none';
  document.getElementById('btn-done-tracing').style.display = '';
  document.getElementById('btn-upload-kml').disabled        = true;
  TOOL_BTNS.forEach(t => document.getElementById('btn-' + t)?.classList.remove('active'));
}

function addTracedOriginal(verts) {
  const i       = STATE.originalFeatures.length;
  const id      = generateId();
  const name    = `Parcel ${String.fromCharCode(65 + i)}`;
  const coords  = latlngsToCoords(verts);
  const geojson = turf.feature({ type: 'Polygon', coordinates: [coords] }, { name });
  STATE.originalFeatures.push({ id, name, area: turf.area(geojson), geojson });

  const poly = L.polygon(verts, {
    color: '#c0c0c0', weight: 1.5, dashArray: '6 5',
    fillColor: '#d8d8d8', fillOpacity: 0.08, interactive: false
  });
  poly.bindTooltip(name, { permanent: true, direction: 'center', className: 'orig-label' });
  STATE.origLG.addLayer(poly);
  computeProjectBoundary();
  // Stay in draw mode so user can trace the next parcel
}

function doneTracing() {
  if (STATE.originalFeatures.length === 0) {
    alert('Please trace at least one parcel first.');
    return;
  }
  STATE.tracingMode = false;
  document.getElementById('map').classList.remove('drawing-cursor');
  document.getElementById('btn-trace').style.display        = '';
  document.getElementById('btn-done-tracing').style.display = 'none';
  document.getElementById('btn-upload-kml').disabled        = false;
  activateTool('select');
  createEditableCopies();
}

// ── Stage 4: computeStats ─────────────────────────────────────────────────────

function computeStats() {
  const params = {
    maxRed:  parseFloat(document.getElementById('p-max-red').value)   || 30,
    minOvlp: parseFloat(document.getElementById('p-min-ovlp').value)  || 50,
    maxVar:  parseFloat(document.getElementById('p-max-var').value)   || 15,
    minSize: parseFloat(document.getElementById('p-min-size').value)  || 1000,
  };

  const origById = {};
  STATE.originalFeatures.forEach(o => { origById[o.id] = o; });

  const parcelStats = [];
  const reductions  = [];   // reduction % for parcels that have originals
  const overlaps    = [];   // overlap % for private parcels with originals
  const turfPolys   = [];   // { id, tp } for coverage / overlap checks

  for (const p of Object.values(STATE.editableParcels)) {
    let tp;
    try { tp = latlngsToTurf(p.latlngs); } catch(e) { continue; }
    turfPolys.push({ id: p.id, tp });

    const newArea  = turf.area(tp);
    const orig     = p.originalId ? origById[p.originalId] : null;
    const origArea = orig ? orig.area : null;

    let deltaPercent   = null;
    let overlapPercent = null;
    const violations   = [];

    if (orig) {
      deltaPercent    = ((newArea - origArea) / origArea) * 100;
      const reduction = -deltaPercent;                          // positive = parcel got smaller
      if (Number(reduction.toFixed(1)) > params.maxRed) violations.push('reduction');
      reductions.push(reduction);

      // Overlap only for private parcels
      if (p.type === 'Private parcel') {
        try {
          const inter    = turf.intersect(tp, orig.geojson);
          overlapPercent = inter ? (turf.area(inter) / newArea) * 100 : 0;
        } catch(e) { overlapPercent = 0; }
        if (Number(overlapPercent.toFixed(1)) < params.minOvlp) violations.push('overlap');
        overlaps.push(overlapPercent);
      }
    }

    // Minimum size — applies to all non-road parcel types
    if (p.type !== 'Road' && newArea < params.minSize) violations.push('size');

    parcelStats.push({ id: p.id, name: p.name, type: p.type,
                       newArea, origArea, deltaPercent, overlapPercent, violations });
  }

  // ── Type totals ───────────────────────────────────────────────────────────
  let roadArea = 0, publicArea = 0, privateArea = 0;
  parcelStats.forEach(ps => {
    if      (ps.type === 'Road')                                                    roadArea    += ps.newArea;
    else if (['Public commercial','Public social','Open space'].includes(ps.type))  publicArea  += ps.newArea;
    else if (ps.type === 'Private parcel')                                          privateArea += ps.newArea;
  });

  const projArea = STATE.projectArea || 0;

  // ── Expensive checks skipped during vertex drag ───────────────────────────
  let coverageGap = null;
  let hasOverlaps = false;

  if (!dragState) {
    if (turfPolys.length > 0 && STATE.projectBoundaryGeojson) {
      try {
        let union = turfPolys[0].tp;
        for (let i = 1; i < turfPolys.length; i++) union = turf.union(union, turfPolys[i].tp);
        const diff = turf.difference(STATE.projectBoundaryGeojson, union);
        coverageGap = diff ? turf.area(diff) : 0;
      } catch(e) { coverageGap = null; }
    }

    outer:
    for (let i = 0; i < turfPolys.length; i++) {
      for (let j = i + 1; j < turfPolys.length; j++) {
        try {
          const inter = turf.intersect(turfPolys[i].tp, turfPolys[j].tp);
          if (inter && turf.area(inter) > 0.1) { hasOverlaps = true; break outer; }
        } catch(e) {}
      }
    }
  }

  // ── Aggregates ────────────────────────────────────────────────────────────
  const avg          = arr => arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : null;
  const avgReduction    = avg(reductions);
  const maxReduction    = reductions.length ? Math.max(...reductions) : null;
  const minReduction    = reductions.length ? Math.min(...reductions) : null;
  const reductionSpread = maxReduction !== null ? maxReduction - minReduction : null;
  const avgOverlap      = avg(overlaps);
  const minOverlap      = overlaps.length ? Math.min(...overlaps) : null;

  let violationCount = parcelStats.reduce((s, ps) => s + ps.violations.length, 0);
  if (reductionSpread !== null && Number(reductionSpread.toFixed(1)) > params.maxVar) violationCount++;

  const smallParcelsCount = parcelStats.filter(ps => ps.violations.includes('size')).length;

  const summary = {
    projectArea: projArea,
    roadArea,    roadPct:    projArea ? roadArea    / projArea * 100 : 0,
    publicArea,  publicPct:  projArea ? publicArea  / projArea * 100 : 0,
    privateArea, privatePct: projArea ? privateArea / projArea * 100 : 0,
    coverageGap, hasOverlaps,
    avgReduction, maxReduction, minReduction, reductionSpread,
    avgOverlap, minOverlap,
    smallParcelsCount,
    violationCount, params,
  };

  STATE.lastSummary = summary;
  renderParcelTable(parcelStats, params);
  renderSummary(summary);
}

// ── Stage 4: parcel table ─────────────────────────────────────────────────────

const PARCEL_TYPES = ['Private parcel','Road','Public commercial','Public social','Open space'];

function renderParcelTable(parcelStats, params) {
  const tbody = document.getElementById('parcel-tbody');
  if (!tbody) return;

  tbody.innerHTML = parcelStats.map(ps => {
    const ok       = ps.violations.length === 0;
    const delta    = ps.deltaPercent;
    const reduction = delta !== null ? -delta : null;     // positive = parcel shrank
    const deltaClass = (reduction !== null && Number(reduction.toFixed(1)) > params.maxRed) ? 'val-bad' : '';
    const deltaStr   = delta !== null
      ? `${delta > 0 ? '+' : ''}${delta.toFixed(1)}%` : '—';
    const ovlpClass  = (ps.overlapPercent !== null && Number(ps.overlapPercent.toFixed(1)) < params.minOvlp)
      ? 'val-bad' : '';
    const ovlpStr    = ps.overlapPercent !== null
      ? `${ps.overlapPercent.toFixed(1)}%` : '—';
    const typeOpts   = PARCEL_TYPES.map(t =>
      `<option value="${escHtml(t)}"${t === ps.type ? ' selected' : ''}>${escHtml(t)}</option>`
    ).join('');
    const shortName  = ps.name.length > 13 ? ps.name.slice(0, 12) + '…' : ps.name;

    return `<tr data-parcel-id="${ps.id}" onclick="selectParcelFromTable('${ps.id}', event)">
      <td><span class="dot ${ok ? 'dot-ok' : 'dot-err'}"></span></td>
      <td title="${escHtml(ps.name)}">${escHtml(shortName)}</td>
      <td><select class="type-select" onchange="changeParcelType('${ps.id}',this.value)">${typeOpts}</select></td>
      <td>${formatArea(ps.newArea)}</td>
      <td>${ps.origArea !== null ? formatArea(ps.origArea) : '—'}</td>
      <td class="${deltaClass}">${deltaStr}</td>
      <td class="${ovlpClass}">${ovlpStr}</td>
    </tr>`;
  }).join('');
  updateTableOverflowHint();
}

function updateTableOverflowHint() {
  const inner = document.getElementById('table-inner');
  const wrap  = document.getElementById('table-scroll-wrap');
  const badge = document.getElementById('table-cols-badge');
  if (!inner || !wrap || !badge) return;

  function refresh() {
    const overflowing = inner.scrollWidth > inner.clientWidth + 2;
    const atEnd       = inner.scrollLeft + inner.clientWidth >= inner.scrollWidth - 2;
    wrap.classList.toggle('has-overflow', overflowing && !atEnd);
    badge.classList.toggle('visible', overflowing);
  }

  refresh();
  inner.onscroll = refresh;
}

function syncTableSelection() {
  document.querySelectorAll('#parcel-tbody tr[data-parcel-id]').forEach(tr => {
    tr.classList.toggle('row-selected', STATE.selectedIds.has(tr.dataset.parcelId));
  });
}

function scrollRowIntoView(id) {
  const tr = document.querySelector(`#parcel-tbody tr[data-parcel-id="${id}"]`);
  if (tr) tr.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function selectParcelFromTable(id, event) {
  if (event.target.closest('select')) return; // let type-dropdown clicks through
  if (STATE.activeTool !== 'select') activateTool('select');

  const ctrl  = event.ctrlKey || event.metaKey;
  const shift = event.shiftKey;

  if (ctrl) {
    // Toggle this parcel in/out of the selection
    if (STATE.selectedIds.has(id)) {
      STATE.selectedIds.delete(id);
      STATE.lastSelectedId = STATE.selectedIds.size > 0 ? [...STATE.selectedIds].at(-1) : null;
    } else {
      STATE.selectedIds.add(id);
      STATE.lastSelectedId = id;
    }
    refreshEditableLayer();
    if (STATE.selectedIds.size === 1) renderVertexHandles(STATE.lastSelectedId);
    else { STATE.vertexLG.clearLayers(); document.getElementById('vhandles').innerHTML = ''; }
    syncTableSelection();

  } else if (shift && STATE.lastSelectedId) {
    // Extend selection from lastSelectedId to id using table row order
    const rowIds = [...document.querySelectorAll('#parcel-tbody tr[data-parcel-id]')]
                     .map(r => r.dataset.parcelId);
    const from = rowIds.indexOf(STATE.lastSelectedId);
    const to   = rowIds.indexOf(id);
    if (from !== -1 && to !== -1) {
      const [lo, hi] = from < to ? [from, to] : [to, from];
      rowIds.slice(lo, hi + 1).forEach(rid => STATE.selectedIds.add(rid));
    }
    STATE.lastSelectedId = id;
    refreshEditableLayer();
    STATE.vertexLG.clearLayers();
    document.getElementById('vhandles').innerHTML = '';
    syncTableSelection();

  } else {
    // Plain click: single select + fit bounds
    selectPolygon(id);
    const p = STATE.editableParcels[id];
    if (p && p.latlngs.length) {
      map.fitBounds(L.latLngBounds(p.latlngs), { padding: [40, 40], maxZoom: 19 });
    }
  }
}

// ── Stage 4: layout summary ───────────────────────────────────────────────────

function renderSummary(s) {
  const el = document.getElementById('summary-body');
  if (!el) return;
  const p = s.params;

  const pct  = n  => n  != null ? n.toFixed(1)  + '%'  : '—';
  const m2   = n  => n  != null ? formatArea(n) + ' m²' : '—';
  const cls  = bad => bad ? 'val-bad' : 'sum-val';

  const coverageHtml = s.coverageGap === null
    ? '<span class="sum-val">—</span>'
    : s.coverageGap <= 0.5
      ? '<span class="val-ok">✓ Full coverage</span>'
      : `<span class="val-bad">⚠ Gap: ${formatArea(s.coverageGap)} m²</span>`;

  const overlapHtml  = s.hasOverlaps
    ? '<span class="val-bad">⚠ Overlaps detected</span>'
    : '<span class="val-ok">✓ No overlaps</span>';

  const spreadBad   = s.reductionSpread !== null && Number(s.reductionSpread.toFixed(1)) > p.maxVar;
  const maxRedBad   = s.maxReduction    !== null && Number(s.maxReduction.toFixed(1))   > p.maxRed;
  const minOvlpBad  = s.minOverlap      !== null && Number(s.minOverlap.toFixed(1))    < p.minOvlp;
  const sizeBad     = s.smallParcelsCount > 0;
  const violBad     = s.violationCount    > 0;

  const sizeHtml = sizeBad
    ? `<span class="val-bad">⚠ ${s.smallParcelsCount} parcel${s.smallParcelsCount !== 1 ? 's' : ''} below ${formatArea(p.minSize)} m²</span>`
    : `<span class="val-ok">✓ All above ${formatArea(p.minSize)} m²</span>`;

  el.innerHTML = `
    <div class="sum-row"><span class="sum-label">Project area</span>         <span class="sum-val">${m2(s.projectArea)}</span></div>
    <div class="sum-row"><span class="sum-label">Road area</span>            <span class="sum-val">${m2(s.roadArea)} (${pct(s.roadPct)})</span></div>
    <div class="sum-row"><span class="sum-label">Public land area</span>     <span class="sum-val">${m2(s.publicArea)} (${pct(s.publicPct)})</span></div>
    <div class="sum-row"><span class="sum-label">Private area</span>         <span class="sum-val">${m2(s.privateArea)} (${pct(s.privatePct)})</span></div>
    <div class="sum-row"><span class="sum-label">Coverage</span>             <span>${coverageHtml}</span></div>
    <div class="sum-row"><span class="sum-label">Polygon overlaps</span>     <span>${overlapHtml}</span></div>
    <div class="sum-row"><span class="sum-label">Min parcel size</span>      <span>${sizeHtml}</span></div>
    <div class="sum-row"><span class="sum-label">Avg reduction</span>        <span class="sum-val">${pct(s.avgReduction)}</span></div>
    <div class="sum-row"><span class="sum-label">Max reduction</span>        <span class="${cls(maxRedBad)}">${pct(s.maxReduction)}</span></div>
    <div class="sum-row"><span class="sum-label">Min reduction</span>        <span class="sum-val">${pct(s.minReduction)}</span></div>
    <div class="sum-row"><span class="sum-label">Reduction spread</span>     <span class="${cls(spreadBad)}">${pct(s.reductionSpread)}</span></div>
    <div class="sum-row"><span class="sum-label">Avg overlap w/ orig</span>  <span class="sum-val">${pct(s.avgOverlap)}</span></div>
    <div class="sum-row"><span class="sum-label">Min overlap w/ orig</span>  <span class="${cls(minOvlpBad)}">${pct(s.minOverlap)}</span></div>
    <div class="sum-row"><span class="sum-label">Violations</span>           <span class="${cls(violBad)}">${s.violationCount}</span></div>
  `;
}

// ── Stage 5: undo / history ───────────────────────────────────────────────────

function serializeEditables() {
  const out = {};
  Object.values(STATE.editableParcels).forEach(p => {
    out[p.id] = {
      id:         p.id,
      name:       p.name,
      type:       p.type,
      latlngs:    p.latlngs.map(ll => ({ lat: ll.lat, lng: ll.lng })),
      originalId: p.originalId,
      roadVerts:  p.roadVerts ? p.roadVerts.map(ll => ({ lat: ll.lat, lng: ll.lng })) : null,
      roadWidth:  p.roadWidth  || null,
    };
  });
  return JSON.stringify(out);
}

function deserializeEditables(json) {
  const raw     = JSON.parse(json);
  const parcels = {};
  Object.values(raw).forEach(p => {
    parcels[p.id] = {
      id:         p.id,
      name:       p.name,
      type:       p.type,
      latlngs:    p.latlngs.map(c => L.latLng(c.lat, c.lng)),
      originalId: p.originalId,
      roadVerts:  p.roadVerts ? p.roadVerts.map(c => L.latLng(c.lat, c.lng)) : null,
      roadWidth:  p.roadWidth  || null,
    };
  });
  return parcels;
}

function pushHistory() {
  STATE.history.push(serializeEditables());
  if (STATE.history.length > MAX_HISTORY) STATE.history.shift();
}

function undo() {
  if (STATE.history.length === 0) return;
  STATE.editableParcels = deserializeEditables(STATE.history.pop());
  STATE.selectedIds    = new Set();
  STATE.lastSelectedId = null;
  STATE.vertexLG.clearLayers();
  document.getElementById('vhandles').innerHTML = '';
  refreshEditableLayer();
  syncTableSelection();
  computeStats();
}

// ── Stage 5: export KML ───────────────────────────────────────────────────────

async function exportKML() {
  if (Object.keys(STATE.editableParcels).length === 0) {
    alert('Nothing to export yet.');
    return;
  }

  const originals  = STATE.originalFeatures.map(o => ({
    type: 'Feature',
    properties: { name: o.name },
    geometry: o.geojson.geometry,
  }));
  const readjusted = Object.values(STATE.editableParcels).map(p => ({
    type: 'Feature',
    properties: { name: p.name, type: p.type },
    geometry: { type: 'Polygon', coordinates: [latlngsToCoords(p.latlngs)] },
  }));

  try {
    const res = await fetch('/api/export/kml', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ originals, readjusted }),
    });
    if (!res.ok) throw new Error('Server returned ' + res.status);
    downloadBlob(await res.blob(), 'readjusted_layout.kml');
  } catch(e) {
    // Fallback: generate KML in the browser (works on file://)
    const kml = buildKMLBrowser(originals, readjusted);
    downloadBlob(
      new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' }),
      'readjusted_layout.kml'
    );
  }
}

function buildKMLBrowser(originals, readjusted) {
  const placemark = feat => {
    const name     = feat.properties?.name || 'Unnamed';
    const desc     = feat.properties?.type || '';
    const ring     = feat.geometry.coordinates[0];
    const coordStr = ring.map(c => `${c[0]},${c[1]},0`).join(' ');
    return `    <Placemark>
      <name>${escHtml(name)}</name>
      <description>${escHtml(desc)}</description>
      <Polygon><outerBoundaryIs><LinearRing>
        <coordinates>${coordStr}</coordinates>
      </LinearRing></outerBoundaryIs></Polygon>
    </Placemark>`;
  };
  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2"><Document>
  <Folder><name>Originals</name>
${originals.map(placemark).join('\n')}
  </Folder>
  <Folder><name>Readjusted layout</name>
${readjusted.map(placemark).join('\n')}
  </Folder>
</Document></kml>`;
}

// ── Stage 5: export CSV (browser-only) ───────────────────────────────────────

function exportCSV() {
  if (Object.keys(STATE.editableParcels).length === 0) {
    alert('Nothing to export yet.');
    return;
  }

  const origById = {};
  STATE.originalFeatures.forEach(o => { origById[o.id] = o; });

  const header = ['Name','Type','New area (m²)','Original area (m²)','Area change (%)','Overlap with original (%)'];
  const rows   = [header];

  for (const p of Object.values(STATE.editableParcels)) {
    let tp;
    try { tp = latlngsToTurf(p.latlngs); } catch(e) { continue; }
    const newArea  = turf.area(tp);
    const orig     = p.originalId ? origById[p.originalId] : null;
    let   deltaStr = '', ovlpStr = '';

    if (orig) {
      deltaStr = (((newArea - orig.area) / orig.area) * 100).toFixed(2);
      if (p.type === 'Private parcel') {
        try {
          const inter = turf.intersect(tp, orig.geojson);
          ovlpStr = inter ? ((turf.area(inter) / newArea) * 100).toFixed(2) : '0.00';
        } catch(e) { ovlpStr = '0.00'; }
      }
    }

    rows.push([
      p.name, p.type,
      Math.round(newArea),
      orig ? Math.round(orig.area) : '',
      deltaStr,
      ovlpStr,
    ]);
  }

  // ── Layout summary section ────────────────────────────────────────────────
  const s = STATE.lastSummary;
  if (s) {
    const p   = s.params;
    const pct = n => n != null ? n.toFixed(2) + '%' : '';
    const m2  = n => n != null ? String(Math.round(n))  : '';
    const coverageVal = s.coverageGap === null ? '' :
                        s.coverageGap <= 0.5   ? 'Full coverage' :
                        `Gap: ${Math.round(s.coverageGap)} m²`;

    rows.push([], ['LAYOUT SUMMARY', '']);
    const srows = [
      ['Project area (m²)',            m2(s.projectArea)],
      ['Road area (m²)',               m2(s.roadArea)],
      ['Road area (%)',                pct(s.roadPct)],
      ['Public land area (m²)',        m2(s.publicArea)],
      ['Public land area (%)',         pct(s.publicPct)],
      ['Private area (m²)',            m2(s.privateArea)],
      ['Private area (%)',             pct(s.privatePct)],
      ['Coverage',                     coverageVal],
      ['Polygon overlaps',             s.hasOverlaps ? 'Yes' : 'No'],
      ['Parcels below min size',       String(s.smallParcelsCount)],
      ['Avg reduction (%)',            pct(s.avgReduction)],
      ['Max reduction (%)',            pct(s.maxReduction)],
      ['Min reduction (%)',            pct(s.minReduction)],
      ['Reduction spread (%)',         pct(s.reductionSpread)],
      ['Avg overlap w/ original (%)',  pct(s.avgOverlap)],
      ['Min overlap w/ original (%)',  pct(s.minOverlap)],
      ['Violations',                   String(s.violationCount)],
      [],
      ['CONSTRAINTS', ''],
      ['Max reduction (%)',            pct(p.maxRed)],
      ['Min overlap (%)',              pct(p.minOvlp)],
      ['Max variation (%)',            pct(p.maxVar)],
      ['Min parcel size (m²)',         String(Math.round(p.minSize))],
    ];
    rows.push(...srows);
  }

  const csv = rows.map(r =>
    r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
  ).join('\r\n');

  downloadBlob(new Blob(['﻿', csv], { type: 'text/csv;charset=utf-8;' }), 'landre_stats.csv');
}

// ── Stage 5: blob download helper ────────────────────────────────────────────

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Shrink selected parcel ────────────────────────────────────────────────────

function shrinkSelected() {
  const pct = parseFloat(document.getElementById('shrink-pct').value);
  if (isNaN(pct) || pct <= 0 || pct >= 100) {
    alert('Please enter a percentage between 0 and 100 (exclusive).');
    return;
  }
  if (STATE.selectedIds.size === 0) {
    alert('Please select at least one parcel first.');
    return;
  }

  const origById = {};
  STATE.originalFeatures.forEach(o => { origById[o.id] = o; });

  pushHistory();

  for (const id of STATE.selectedIds) {
    const p = STATE.editableParcels[id];
    if (!p) continue;
    if (p.type === 'Road') continue; // roads are resized by dragging centerline endpoints

    let tp;
    try { tp = latlngsToTurf(p.latlngs); } catch(e) { continue; }

    const orig        = p.originalId ? origById[p.originalId] : null;
    const currentArea = turf.area(tp);
    const refArea     = orig ? orig.area : currentArea;
    const targetArea  = refArea * (1 - pct / 100);
    if (targetArea <= 0) continue;

    // Area scales as factor², so to hit targetArea from currentArea:
    const scaleFactor = Math.sqrt(targetArea / currentArea);
    const scaled      = turf.transformScale(tp, scaleFactor);
    p.latlngs         = coordsToLatLngs(scaled.geometry.coordinates);
  }

  refreshEditableLayer();
  if (STATE.selectedIds.size === 1) renderVertexHandles(STATE.lastSelectedId);
  computeStats();
}

// ── Stage 3.5: road centerline editing ───────────────────────────────────────

function rebufferRoad(parcel) {
  if (!parcel.roadVerts || parcel.roadVerts.length < 2 || !parcel.roadWidth) return;
  const coords = parcel.roadVerts.map(ll => [ll.lng, ll.lat]);
  const line   = turf.lineString(coords);
  let buf = turf.buffer(line, parcel.roadWidth / 2, { units: 'meters' });
  if (!buf) return;
  if (buf.geometry.type === 'MultiPolygon') {
    let best = null, bestArea = 0;
    buf.geometry.coordinates.forEach(rings => {
      const poly = turf.polygon(rings); const a = turf.area(poly);
      if (a > bestArea) { bestArea = a; best = poly; }
    });
    if (!best) return;
    buf = best;
  }
  if (STATE.projectBoundaryGeojson) {
    const clipped = turf.intersect(buf, STATE.projectBoundaryGeojson);
    if (clipped && clipped.geometry.type === 'Polygon') buf = clipped;
  }
  const lls = coordsToLatLngs(buf.geometry.coordinates);
  if (lls.length >= 3) parcel.latlngs = lls;
}

function renderRoadHandles(id) {
  const container = document.getElementById('vhandles');
  container.innerHTML = '';
  _vertexMarkers = [];
  STATE.vertexLG.clearLayers();
  const p = STATE.editableParcels[id];
  if (!p || !p.roadVerts) return;

  // Dashed centerline so the user can see the editing axis
  STATE.vertexLG.addLayer(L.polyline(p.roadVerts, {
    color: '#444', weight: 1.5, dashArray: '6 4', interactive: false
  }));

  p.roadVerts.forEach((ll, idx) => {
    const pt  = map.latLngToContainerPoint(ll);
    const div = document.createElement('div');
    div.className = 'vhandle-road';
    div.style.left = pt.x + 'px';
    div.style.top  = pt.y + 'px';
    div._ll = ll;
    div.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      map.dragging.disable();
      closeEdgePopup();
      startRoadVertexDrag(id, idx, div);
    });
    div.addEventListener('click', e => e.stopPropagation());
    container.appendChild(div);
    _vertexMarkers.push(div);
  });
}

function startRoadVertexDrag(id, idx, marker) {
  const p = STATE.editableParcels[id];
  if (!p || !p.roadVerts) return;
  let _moved = false;
  const _container = map.getContainer();

  function onMove(e) {
    if (!_moved) { pushHistory(); _moved = true; }
    const rect  = _container.getBoundingClientRect();
    const rawLL = map.containerPointToLatLng(L.point(e.clientX - rect.left, e.clientY - rect.top));
    p.roadVerts[idx] = rawLL;
    if (marker && marker.parentNode) {
      const pt = map.latLngToContainerPoint(rawLL);
      marker.style.left = pt.x + 'px';
      marker.style.top  = pt.y + 'px';
      marker._ll = rawLL;
    }
    // Redraw centerline guide in-place
    STATE.vertexLG.clearLayers();
    STATE.vertexLG.addLayer(L.polyline(p.roadVerts, {
      color: '#444', weight: 1.5, dashArray: '6 4', interactive: false
    }));
    rebufferRoad(p);
    refreshEditableLayer();
    computeStats();
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    map.dragging.enable();
    if (_moved) {
      _justDragged = true;
      setTimeout(() => { _justDragged = false; }, 50);
    }
    computeStats();
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
}

// ── Stage 3.6: edge alignment (parallel / perpendicular) ──────────────────────

function showEdgePopup(id, edgeIdx, midLatLng, clientX, clientY) {
  _pendingEdgeClick = { id, edgeIdx, midLatLng };
  const popup = document.getElementById('edge-popup');
  popup.style.left = clientX + 'px';
  popup.style.top  = (clientY + 4) + 'px';
  popup.classList.add('open');
  // Nudge popup on-screen if it would overflow (needs a tick for dimensions to be known)
  setTimeout(() => {
    const r = popup.getBoundingClientRect();
    if (r.right  > window.innerWidth)  popup.style.left = (clientX - r.width)  + 'px';
    if (r.bottom > window.innerHeight) popup.style.top  = (clientY - r.height) + 'px';
  }, 0);
}

function closeEdgePopup() {
  document.getElementById('edge-popup').classList.remove('open');
  _pendingEdgeClick = null;
}

function insertEdgeFromPopup() {
  if (!_pendingEdgeClick) { closeEdgePopup(); return; }
  const { id, edgeIdx, midLatLng } = _pendingEdgeClick;
  closeEdgePopup();
  insertVertexAndDrag(id, edgeIdx + 1, midLatLng);
}

function startEdgeOp(mode) {
  if (!_pendingEdgeClick) { closeEdgePopup(); return; }
  const { id, edgeIdx } = _pendingEdgeClick;
  closeEdgePopup();
  const p = STATE.editableParcels[id];
  if (!p) return;
  const n = p.latlngs.length;
  const a = p.latlngs[edgeIdx % n];
  const b = p.latlngs[(edgeIdx + 1) % n];
  const highlightLine = L.polyline([a, b], {
    color: '#e74c3c', weight: 4, interactive: false
  }).addTo(map);
  _edgeOpState = { parcelId: id, edgeIdx, mode, highlightLine };
  const hint = document.getElementById('edge-op-hint');
  hint.textContent = mode === 'parallel'
    ? 'Click any edge to align parallel to it  ·  Esc to cancel'
    : 'Click any edge to align perpendicular to it  ·  Esc to cancel';
  hint.classList.add('visible');
}

function cancelEdgeOp() {
  if (!_edgeOpState) return;
  if (_edgeOpState.highlightLine) _edgeOpState.highlightLine.remove();
  _edgeOpState = null;
  document.getElementById('edge-op-hint').classList.remove('visible');
}

function applyEdgeOp(refParcelId, refEdgeIdx) {
  if (!_edgeOpState) return;
  const { parcelId, edgeIdx, mode } = _edgeOpState;
  cancelEdgeOp();

  const p    = STATE.editableParcels[parcelId];
  const refP = STATE.editableParcels[refParcelId];
  if (!p || !refP) return;

  const n    = p.latlngs.length;
  const refN = refP.latlngs.length;
  const idxA    = edgeIdx % n;
  const idxB    = (edgeIdx + 1) % n;
  const idxPrev = (idxA - 1 + n) % n;
  const idxNext = (idxB + 1) % n;

  // Work in lng/lat as flat 2-D coords (accurate for small local regions)
  const A    = { x: p.latlngs[idxA].lng,    y: p.latlngs[idxA].lat };
  const B    = { x: p.latlngs[idxB].lng,    y: p.latlngs[idxB].lat };
  const Prev = { x: p.latlngs[idxPrev].lng, y: p.latlngs[idxPrev].lat };
  const Next = { x: p.latlngs[idxNext].lng, y: p.latlngs[idxNext].lat };

  const rIdxA = refEdgeIdx % refN;
  const rIdxB = (refEdgeIdx + 1) % refN;
  const rA = { x: refP.latlngs[rIdxA].lng, y: refP.latlngs[rIdxA].lat };
  const rB = { x: refP.latlngs[rIdxB].lng, y: refP.latlngs[rIdxB].lat };

  // Compute new direction for the target edge
  let dir = { x: rB.x - rA.x, y: rB.y - rA.y };
  const dlen = Math.hypot(dir.x, dir.y);
  if (dlen < 1e-14) return;
  dir = { x: dir.x / dlen, y: dir.y / dlen };
  if (mode === 'perpendicular') dir = { x: -dir.y, y: dir.x };

  // New edge line passes through the midpoint of the original edge
  const M = { x: (A.x + B.x) / 2, y: (A.y + B.y) / 2 };

  // Adjacent edge directions (kept intact; only their endpoints move)
  const dPrev = { x: A.x - Prev.x, y: A.y - Prev.y }; // Prev → A
  const dNext = { x: Next.x - B.x, y: Next.y - B.y }; // B → Next

  // New vertex positions = intersection of new edge line with each adjacent edge line
  const newA = lineIntersect(M, dir, Prev, dPrev);
  const newB = lineIntersect(M, dir, B,    dNext);
  if (!newA || !newB) return; // adjacent edges parallel to new direction — no solution

  pushHistory();
  p.latlngs[idxA] = L.latLng(newA.y, newA.x);
  p.latlngs[idxB] = L.latLng(newB.y, newB.x);

  refreshEditableLayer();
  if (STATE.selectedIds.has(parcelId) && STATE.selectedIds.size === 1)
    renderVertexHandles(parcelId);
  computeStats();
}

// Intersection of line through P with direction d1, and line through Q with direction d2.
function lineIntersect(P, d1, Q, d2) {
  const det = -d1.x * d2.y + d2.x * d1.y;
  if (Math.abs(det) < 1e-14) return null; // parallel lines
  const dx = Q.x - P.x, dy = Q.y - P.y;
  const t  = (-dx * d2.y + d2.x * dy) / det;
  return { x: P.x + t * d1.x, y: P.y + t * d1.y };
}

// Nearest polygon edge (within 20 screen-px) to a given map latlng.
function findNearestEdge(latlng) {
  const pt = map.latLngToContainerPoint(latlng);
  let best = null, bestDist = Infinity;
  Object.values(STATE.editableParcels).forEach(p => {
    const n = p.latlngs.length;
    for (let i = 0; i < n; i++) {
      const a = map.latLngToContainerPoint(p.latlngs[i]);
      const b = map.latLngToContainerPoint(p.latlngs[(i + 1) % n]);
      const d = ptSegDist(pt, a, b);
      if (d < bestDist) { bestDist = d; best = { parcelId: p.id, edgeIdx: i }; }
    }
  });
  return bestDist < 20 ? best : null;
}

function ptSegDist(p, a, b) {
  const abx = b.x - a.x, aby = b.y - a.y;
  const len2 = abx * abx + aby * aby;
  if (len2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
  const t = Math.max(0, Math.min(1, ((p.x - a.x) * abx + (p.y - a.y) * aby) / len2));
  return Math.hypot(p.x - (a.x + t * abx), p.y - (a.y + t * aby));
}

// ── Boot ─────────────────────────────────────────────────────────────────────
initMap();
