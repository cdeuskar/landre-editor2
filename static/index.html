<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LandRe Editor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           font-size: 13px; display: flex; height: 100vh; overflow: hidden; }

    /* ── Map ── */
    #map { flex: 1; height: 100vh; z-index: 0; }

    /* ── Toolbar (left, floating) ── */
    #toolbar {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      display: flex; flex-direction: column; gap: 3px;
    }
    .tool-sep { border: none; border-top: 1px solid #ccc; margin: 2px 0; }
    .tool-btn {
      background: white; border: 1px solid #bbb; border-radius: 4px;
      padding: 5px 10px; cursor: pointer; font-size: 12px;
      min-width: 148px; text-align: left; white-space: nowrap;
    }
    .tool-btn:hover { background: #f0f0f0; }
    .tool-btn.active { background: #2980b9; color: white; border-color: #1a6fa0; }

    /* ── Basemap switcher (bottom-left, floating) ── */
    #basemap-ctrl {
      position: absolute; bottom: 28px; left: 10px; z-index: 1000;
      background: white; border: 1px solid #bbb; border-radius: 4px;
      padding: 6px 10px; font-size: 12px;
    }
    #basemap-ctrl label { display: flex; align-items: center; gap: 5px;
                          cursor: pointer; padding: 1px 0; }

    /* ── Side panel ── */
    #side-panel {
      position: relative;
      width: 500px; min-width: 160px; height: 100vh;
      background: #fafafa; border-left: 1px solid #ddd;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #side-panel.collapsed { width: 36px; min-width: 36px; }
    #side-panel.collapsed #panel-title { display: none; }
    #side-panel.collapsed #panel-header { justify-content: center; padding: 9px 4px; }
    #panel-header {
      background: #2c3e50; color: white; padding: 9px 12px;
      font-weight: 600; font-size: 13px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; position: relative; z-index: 2;
    }
    #panel-toggle {
      background: none; border: none; color: white;
      font-size: 15px; cursor: pointer; padding: 0 2px;
      flex-shrink: 0;
    }
    #panel-body {
      flex: 1; overflow-y: auto; padding: 8px 10px;
    }
    #side-panel.collapsed #panel-body { display: none; }
    #drag-handle {
      position: absolute; left: 0; top: 0; height: 100%; width: 6px;
      cursor: col-resize; z-index: 10; background: transparent;
    }
    #drag-handle:hover { background: rgba(59,110,212,.25); }

    /* ── Collapsible sections ── */
    .sec-hdr {
      font-weight: 600; color: #2c3e50; font-size: 12px;
      margin: 10px 0 5px; padding-bottom: 4px;
      border-bottom: 1px solid #ddd;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none;
    }
    .sec-hdr .caret { font-size: 10px; transition: transform .15s; }
    .sec-hdr.closed .caret { transform: rotate(-90deg); }

    /* ── Parameters ── */
    .param-row {
      display: flex; align-items: center; justify-content: space-between;
      margin: 4px 0; font-size: 12px;
    }
    .param-row input[type=number] {
      width: 58px; padding: 2px 4px; border: 1px solid #ccc;
      border-radius: 3px; text-align: right; font-size: 12px;
    }

    /* ── Parcel table ── */
    #table-scroll-wrap { position: relative; }
    #table-scroll-wrap .scroll-fade {
      display: none; position: absolute; top: 0; right: 0; bottom: 0; width: 32px;
      background: linear-gradient(to right, transparent, #fafafa);
      pointer-events: none; z-index: 2;
    }
    #table-scroll-wrap.has-overflow .scroll-fade { display: block; }
    .table-inner { overflow-x: auto; }
    .cols-badge {
      display: none; font-size: 9px; font-weight: 400; letter-spacing: 0.02em;
      color: #666; background: #e2e8f0; border-radius: 3px;
      padding: 1px 5px; margin-left: 6px; vertical-align: middle;
    }
    .cols-badge.visible { display: inline-block; }
    #parcel-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    #parcel-table th {
      background: #ecf0f1; padding: 4px 5px; text-align: left;
      border-bottom: 2px solid #bdc3c7; white-space: nowrap; font-size: 10px;
    }
    #parcel-table td {
      padding: 3px 5px; border-bottom: 1px solid #eee; white-space: nowrap;
    }
    #parcel-table tr:hover td { background: #f5f5f5; }
    #parcel-table tr.row-selected td { background: #fef3e2; }
    #parcel-table tr.row-selected:hover td { background: #fde8c8; }
    #parcel-table tbody tr { cursor: pointer; user-select: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-ok  { background: #27ae60; }
    .dot-err { background: #e74c3c; }
    .val-bad { color: #c0392b; font-weight: 600; }
    .val-ok  { color: #27ae60; }
    .type-select { font-size: 11px; border: 1px solid #ccc; border-radius: 2px;
                   padding: 1px 2px; max-width: 90px; }

    /* ── Summary ── */
    #summary-content { font-size: 12px; }
    .sum-row {
      display: flex; justify-content: space-between;
      padding: 3px 2px; border-bottom: 1px solid #f0f0f0;
    }
    .sum-label { color: #555; }
    .sum-val   { font-weight: 600; }

    /* ── Shrink row ── */
    .tool-shrink-row {
      display: flex; align-items: center; justify-content: space-between;
      background: white; border: 1px solid #bbb; border-radius: 4px;
      padding: 4px 8px; font-size: 12px; min-width: 148px;
    }
    .tool-shrink-row label { cursor: default; }
    .tool-shrink-row input[type=number] {
      width: 46px; padding: 2px 4px; border: 1px solid #ccc;
      border-radius: 3px; text-align: right; font-size: 12px;
    }

    /* ── Drawing cursor ── */
    .drawing-cursor { cursor: crosshair !important; }

    /* ── Vertex / midpoint drag handles (HTML divs, above all Leaflet panes) ── */
    #vhandles {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 650;
    }
    .vhandle-v, .vhandle-m {
      position: absolute; border-radius: 50%;
      pointer-events: all; box-sizing: border-box;
    }
    .vhandle-v {
      width: 14px; height: 14px; margin: -7px 0 0 -7px;
      background: white; border: 2px solid #e67e22; cursor: grab;
    }
    .vhandle-m {
      width: 10px; height: 10px; margin: -5px 0 0 -5px;
      background: #60a5fa; border: 1.5px solid #1d4ed8; cursor: grab;
      border-radius: 2px; transform: rotate(45deg);
    }
    .vhandle-road {
      width: 13px; height: 13px; margin: -7px 0 0 -7px;
      background: #555; border: 2px solid #111; border-radius: 2px;
      cursor: grab; pointer-events: all; box-sizing: border-box;
    }

    /* ── Close-polygon pulse marker ── */
    @keyframes close-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .close-pulse { animation: close-pulse 0.85s ease-in-out infinite; }

    /* ── Polygon labels ── */
    .orig-label {
      background: none; border: none; box-shadow: none;
      color: #aaa; font-size: 9px; font-weight: 400;
      text-shadow: 0 0 2px white, 0 0 2px white;
      pointer-events: none; white-space: nowrap;
    }
    .edit-label {
      background: none; border: none; box-shadow: none;
      color: #1a3d1a; font-size: 11px; font-weight: 700;
      text-shadow: 0 0 4px white, 0 0 4px white;
      pointer-events: none; white-space: nowrap;
    }

    /* ── Modal dialogs (name + road) ── */
    #name-dialog, #road-dialog {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 9999; align-items: center; justify-content: center;
    }
    #name-dialog.open, #road-dialog.open { display: flex; }
    #name-dialog-box, #road-dialog-box {
      background: white; border-radius: 6px; padding: 20px 24px;
      min-width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    #name-dialog-box h3, #road-dialog-box h3 { margin-bottom: 14px; font-size: 14px; }
    #name-dialog-box label, #road-dialog-box label { display: block; font-size: 12px; margin-bottom: 4px; }
    #name-dialog-box input, #name-dialog-box select,
    #road-dialog-box  input, #road-dialog-box  select {
      width: 100%; padding: 5px 7px; margin-bottom: 10px;
      border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
    }
    #name-dialog-box .dlg-btns, #road-dialog-box .dlg-btns { display: flex; gap: 8px; justify-content: flex-end; }
    #name-dialog-box button, #road-dialog-box button {
      padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .btn-primary { background: #2980b9; color: white; border: none; }
    .btn-cancel  { background: #ecf0f1; border: 1px solid #bbb; }

    /* ── Edge-alignment popup ── */
    #edge-popup {
      display: none; position: fixed; background: white;
      border: 1px solid #bbb; border-radius: 4px;
      box-shadow: 0 2px 10px rgba(0,0,0,.18);
      z-index: 9000; padding: 3px 0; min-width: 190px;
    }
    #edge-popup.open { display: block; }
    #edge-popup button {
      display: block; width: 100%; padding: 7px 14px;
      border: none; background: white; cursor: pointer;
      font-size: 12px; text-align: left; white-space: nowrap;
    }
    #edge-popup button:hover { background: #f0f6ff; }
    #edge-popup hr { border: none; border-top: 1px solid #eee; margin: 3px 0; }
    #edge-op-hint {
      display: none; position: fixed; bottom: 42px;
      left: 50%; transform: translateX(-50%);
      background: rgba(41,128,185,.92); color: white;
      padding: 5px 16px; border-radius: 20px; font-size: 12px;
      z-index: 2000; pointer-events: none; white-space: nowrap;
    }
    #edge-op-hint.visible { display: block; }
  </style>
</head>
<body>

<!-- ── Map ─────────────────────────────────────────────────────────────── -->
<div id="map"></div>

<!-- ── Toolbar ──────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <button class="tool-btn" id="btn-upload-kml"  onclick="triggerKMLUpload()">📂 Upload KML</button>
  <button class="tool-btn" id="btn-trace"        onclick="startTracing()">✏️ Trace parcels</button>
  <button class="tool-btn" id="btn-done-tracing" onclick="doneTracing()"
          style="display:none">✔ Done tracing</button>
  <hr class="tool-sep">
  <button class="tool-btn active" id="btn-select" onclick="activateTool('select')">↖ Select / Reshape</button>
  <button class="tool-btn"        id="btn-draw"      onclick="activateTool('draw')">⬡ Draw polygon</button>
  <button class="tool-btn"        id="btn-draw-road" onclick="activateTool('draw-road')">╌ Draw road</button>
  <button class="tool-btn"        id="btn-delete" onclick="activateTool('delete')">✕ Delete polygon</button>
  <button class="tool-btn"        id="btn-pan"    onclick="activateTool('pan')">✋ Pan</button>
  <hr class="tool-sep">
  <button class="tool-btn" onclick="undo()">↩ Undo (Ctrl+Z)</button>
  <hr class="tool-sep">
  <div class="tool-shrink-row">
    <label>Shrink&nbsp;%</label>
    <input type="number" id="shrink-pct" value="10" min="0" max="100" step="1">
  </div>
  <button class="tool-btn" onclick="shrinkSelected()">↙ Shrink selected parcels</button>
  <hr class="tool-sep">
  <button class="tool-btn" id="btn-tog-orig"  onclick="toggleOriginals()">👁 Hide originals</button>
  <button class="tool-btn" id="btn-tog-bound" onclick="toggleBoundary()">⬚ Hide boundary</button>
  <hr class="tool-sep">
  <button class="tool-btn" onclick="exportKML()">⬇ Export KML</button>
  <button class="tool-btn" onclick="exportCSV()">⬇ Export CSV</button>
</div>

<div id="road-dialog">
  <div id="road-dialog-box">
    <h3>New road</h3>
    <label>Name</label>
    <input type="text" id="rdlg-name" placeholder="Road name" />
    <label>Width (metres)</label>
    <input type="number" id="rdlg-width" value="6" min="0.5" max="200" step="0.5" />
    <div class="dlg-btns">
      <button class="btn-cancel" onclick="cancelRoadDialog()">Cancel</button>
      <button class="btn-primary" onclick="confirmRoadDialog()">Add</button>
    </div>
  </div>
</div>

<div id="edge-popup">
  <button onclick="startEdgeOp('parallel')">Make parallel to…</button>
  <button onclick="startEdgeOp('perpendicular')">Make perpendicular to…</button>
  <hr>
  <button onclick="insertEdgeFromPopup()">Insert vertex here</button>
</div>
<div id="edge-op-hint"></div>

<!-- hidden file input -->
<input type="file" id="kml-input" accept=".kml" style="display:none"
       onchange="handleKMLFile(event)" />

<!-- ── Basemap switcher ─────────────────────────────────────────────────── -->
<div id="basemap-ctrl">
  <label><input type="radio" name="bm" value="satellite" checked
                onchange="switchBasemap('satellite')"> Satellite</label>
  <label><input type="radio" name="bm" value="osm"
                onchange="switchBasemap('osm')"> OpenStreetMap</label>
</div>

<!-- ── Side panel ───────────────────────────────────────────────────────── -->
<div id="side-panel">
  <div id="drag-handle"></div>
  <div id="panel-header">
    <span id="panel-title">LandRe Editor</span>
    <button id="panel-toggle" onclick="togglePanel()">◀</button>
  </div>
  <div id="panel-body">

    <!-- Parameters -->
    <div class="sec-hdr" onclick="toggleSection('params-body',this)">
      Parameters <span class="caret">▾</span>
    </div>
    <div id="params-body">
      <div class="param-row">
        <label>Max reduction (%)</label>
        <input type="number" id="p-max-red" value="30" min="0" max="100" onchange="computeStats()">
      </div>
      <div class="param-row">
        <label>Min overlap (%)</label>
        <input type="number" id="p-min-ovlp" value="50" min="0" max="100" onchange="computeStats()">
      </div>
      <div class="param-row">
        <label>Max variation (%)</label>
        <input type="number" id="p-max-var" value="15" min="0" max="100" onchange="computeStats()">
      </div>
      <div class="param-row">
        <label>Min parcel size (m²)</label>
        <input type="number" id="p-min-size" value="1000" min="0" step="50" onchange="computeStats()">
      </div>
    </div>

    <!-- Parcel table -->
    <div class="sec-hdr" onclick="toggleSection('table-body',this)">
      Parcels <span id="table-cols-badge" class="cols-badge">scroll for more ▸</span><span class="caret">▾</span>
    </div>
    <div id="table-body">
      <div id="table-scroll-wrap">
        <div class="scroll-fade"></div>
        <div class="table-inner" id="table-inner">
          <table id="parcel-table">
            <thead><tr>
              <th></th><th>Name</th><th>Type</th>
              <th>New m²</th><th>Orig m²</th><th>Δ%</th><th>Ovlp%</th>
            </tr></thead>
            <tbody id="parcel-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Layout summary -->
    <div class="sec-hdr" onclick="toggleSection('summary-body',this)" style="margin-top:10px">
      Layout summary <span class="caret">▾</span>
    </div>
    <div id="summary-body" id="summary-content"></div>

  </div><!-- /panel-body -->
</div><!-- /side-panel -->

<!-- ── Name / type dialog ───────────────────────────────────────────────── -->
<div id="name-dialog">
  <div id="name-dialog-box">
    <h3>New polygon</h3>
    <label>Name</label>
    <input type="text" id="dlg-name" placeholder="Parcel name" />
    <label>Type</label>
    <select id="dlg-type">
      <option value="Private parcel">Private parcel</option>
      <option value="Road">Road</option>
      <option value="Public commercial">Public commercial</option>
      <option value="Public social">Public social</option>
      <option value="Open space">Open space</option>
    </select>
    <div class="dlg-btns">
      <button class="btn-cancel" onclick="cancelDialog()">Cancel</button>
      <button class="btn-primary" onclick="confirmDialog()">Add</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     JavaScript — Stage 1: globals, map init, tool switching, UI helpers
     ══════════════════════════════════════════════════════════════════════ -->
<script>
// ── Global state ────────────────────────────────────────────────────────────
const STATE = {
  // layers
  originalFeatures:  [],       // [{id, name, area, geojson}]
  editableParcels:   {},       // id -> {id, name, type, latlngs, originalId}

  // map layer groups
  origLG:   null,
  editLG:   null,
  vertexLG: null,
  boundaryLG: null,

  // interaction
  activeTool:     'select',
  selectedIds:    new Set(),   // multi-select; shift-click to toggle
  lastSelectedId: null,        // most recent for vertex handles
  originalsVis:   true,
  boundaryVis:   true,

  // drawing
  drawVerts:     [],           // L.LatLng[] during polygon draw
  drawLine:      null,         // L.Polyline preview
  tracingMode:   false,        // true = tracing originals

  // pending dialog callbacks / data
  dialogResolve:    null,
  pendingRoadVerts: null,
  lastSummary:      null,

  // undo
  history: [],                 // array of serialised snapshots

  // project boundary (set by computeProjectBoundary)
  projectBoundaryGeojson: null,
  projectArea: 0,
};

// ── Map ─────────────────────────────────────────────────────────────────────
let map;
const baseLayers = {};

function initMap() {
  map = L.map('map', { zoomControl: true, preferCanvas: false })
         .setView([-2.1736, 30.2044], 13);

  baseLayers.satellite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Tiles © Esri', maxZoom: 22, maxNativeZoom: 20 }
  );
  baseLayers.osm = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© OpenStreetMap contributors', maxZoom: 22 }
  );

  baseLayers.satellite.addTo(map);

  // Layer groups (order matters for z-index)
  STATE.origLG    = L.layerGroup().addTo(map);
  STATE.boundaryLG = L.layerGroup().addTo(map);
  STATE.editLG    = L.layerGroup().addTo(map);
  STATE.vertexLG  = L.layerGroup().addTo(map);

  // Vertex handle overlay — plain HTML divs, always above SVG and tooltip panes
  const _vh = document.createElement('div');
  _vh.id = 'vhandles';
  map.getContainer().appendChild(_vh);
  map.on('move zoom', () => {
    for (const div of document.getElementById('vhandles').children) {
      if (div._ll) {
        const pt = map.latLngToContainerPoint(div._ll);
        div.style.left = pt.x + 'px';
        div.style.top  = pt.y + 'px';
      }
    }
  });

  map.on('click',     onMapClick);
  map.on('dblclick',  onMapDblClick);
  map.on('mousemove', onMapMouseMove);
  map.doubleClickZoom.disable();

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.key === 'Escape') { cancelDraw(); cancelEdgeOp(); closeEdgePopup(); }
    if (e.key === 'Enter') {
      const isRoad    = STATE.activeTool === 'draw-road';
      const isPolygon = STATE.activeTool === 'draw' || STATE.tracingMode;
      const minVerts  = isRoad ? 2 : 3;
      if ((isRoad || isPolygon) && STATE.drawVerts.length >= minVerts) {
        e.preventDefault();
        if (clickTimer !== null) { clearTimeout(clickTimer); clickTimer = null; }
        finishDrawing();
      }
    }
  });

  initResizeHandle();
}

function switchBasemap(type) {
  const current = type === 'satellite' ? 'osm' : 'satellite';
  if (map.hasLayer(baseLayers[current])) map.removeLayer(baseLayers[current]);
  if (!map.hasLayer(baseLayers[type]))   baseLayers[type].addTo(map);
  baseLayers[type].bringToBack();
}

// ── Tool activation ──────────────────────────────────────────────────────────
const TOOL_BTNS = ['select', 'draw', 'draw-road', 'delete', 'pan'];

function activateTool(name) {
  if (STATE.tracingMode && name !== 'select') return; // lock during tracing

  // Cancel any active draw / edge op first
  cancelDraw();
  cancelEdgeOp();
  closeEdgePopup();
  deselectAll();

  TOOL_BTNS.forEach(t => {
    const b = document.getElementById('btn-' + t);
    if (b) b.classList.toggle('active', t === name);
  });

  STATE.activeTool = name;

  // Cursor
  const mapEl = document.getElementById('map');
  mapEl.classList.toggle('drawing-cursor', name === 'draw' || name === 'draw-road' || name === 'delete');
  map.dragging[name === 'pan' ? 'enable' : 'enable'](); // always enabled (Leaflet default)
}

// ── Panel / section UI ───────────────────────────────────────────────────────
function togglePanel() {
  const panel = document.getElementById('side-panel');
  const btn   = document.getElementById('panel-toggle');
  const collapsed = panel.classList.toggle('collapsed');
  btn.textContent = collapsed ? '▶' : '◀';
  map.invalidateSize();
}

function initResizeHandle() {
  const handle = document.getElementById('drag-handle');
  const panel  = document.getElementById('side-panel');
  const btn    = document.getElementById('panel-toggle');
  let resizing = false;

  handle.addEventListener('mousedown', e => {
    resizing = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const newWidth = Math.min(600, Math.max(200, window.innerWidth - e.clientX));
    panel.style.width    = newWidth + 'px';
    panel.style.minWidth = newWidth + 'px';
    updateTableOverflowHint();
    if (panel.classList.contains('collapsed')) {
      panel.classList.remove('collapsed');
      btn.textContent = '◀';
    }
  });

  document.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    map.invalidateSize();
  });
}

function toggleSection(bodyId, hdrEl) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  if (hdrEl) hdrEl.classList.toggle('closed', !hidden);
}

function toggleOriginals() {
  STATE.originalsVis = !STATE.originalsVis;

// ── Utilities ────────────────────────────────────────────────────────────────
function generateId() {
  return '_' + Math.random().toString(36).substr(2, 9);
}

function getTypeStyle(type) {
  return {
    'Private parcel':    { color: '#1a7a1a', fillColor: '#90ee90', fillOpacity: 0.45 },
    'Road':              { color: '#333333', fillColor: '#888888', fillOpacity: 0.65 },
    'Public commercial': { color: '#1a5276', fillColor: '#aed6f1', fillOpacity: 0.55 },
    'Public social':     { color: '#7d4c0e', fillColor: '#f0b27a', fillOpacity: 0.55 },
    'Open space':        { color: '#1a5c4a', fillColor: '#a2d9ce', fillOpacity: 0.55 },
  }[type] || { color: '#1a7a1a', fillColor: '#90ee90', fillOpacity: 0.45 };
}

function formatArea(m2) {
  return m2 == null ? '—' : Math.round(m2).toLocaleString();
}

function formatPct(n) {
  return n == null ? '—' : n.toFixed(1) + '%';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function triggerKMLUpload() {
  document.getElementById('kml-input').click();
}

// ── Stage 2: coordinate helpers ──────────────────────────────────────────────

// GeoJSON ring [[lng,lat],...] → L.LatLng[] (without closing duplicate)
function coordsToLatLngs(ring) {
  // ring may be [[lng,lat],...] or [[[lng,lat],...]] — unwrap one level if needed
  const r = (Array.isArray(ring[0]) && Array.isArray(ring[0][0])) ? ring[0] : ring;
  const closed = r.length > 1 && r[0][0] === r[r.length-1][0] && r[0][1] === r[r.length-1][1];
  const pts = closed ? r.slice(0, -1) : r;
  return pts.map(c => L.latLng(c[1], c[0]));
}

// L.LatLng[] → closed GeoJSON ring [[lng,lat],...]
function latlngsToCoords(latlngs) {
  const c = latlngs.map(ll => [ll.lng, ll.lat]);
  c.push([...c[0]]);
  return c;
}

// L.LatLng[] → turf Polygon feature
function latlngsToTurf(latlngs) {
  return turf.polygon([latlngsToCoords(latlngs)]);
}

// ── Stage 2: KML upload ───────────────────────────────────────────────────────

async function handleKMLFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';  // allow re-upload of same file

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/api/upload/kml', { method: 'POST', body: formData });
    if (!res.ok) throw new Error('Server error ' + res.status);
    const fc = await res.json();
    if (!fc.features || fc.features.length === 0) {
      alert('No polygon features found in the KML file.');
      return;
    }
    loadOriginals(fc.features);
  } catch (err) {
    // Fallback: parse KML entirely in the browser
    try {
      const text     = await file.text();
      const features = parseKMLBrowser(text);
      if (features.length > 0) loadOriginals(features);
      else alert('No polygon features found in the KML file.');
    } catch (err2) {
      alert('Could not parse KML: ' + err2.message);
    }
  }
}

// Lightweight browser-side KML parser (used when server is unavailable)
function parseKMLBrowser(text) {
  const doc   = new DOMParser().parseFromString(text, 'application/xml');
  const pms   = [...doc.querySelectorAll('Placemark')];
  const feats = [];
  pms.forEach((pm, i) => {
    const nameEl = pm.querySelector('name');
    const name   = nameEl?.textContent.trim() || `Parcel ${String.fromCharCode(65 + i)}`;
    const polyEl = pm.querySelector('Polygon');
    if (!polyEl) return;
    const raw = polyEl.querySelector('coordinates')?.textContent.trim();
    if (!raw) return;
    const coords = raw.split(/\s+/).reduce((acc, tok) => {
      const p = tok.split(',');
      if (p.length >= 2) acc.push([parseFloat(p[0]), parseFloat(p[1])]);
      return acc;
    }, []);
    if (coords.length < 3) return;
    if (coords[0][0] !== coords[coords.length-1][0]) coords.push([...coords[0]]);
    feats.push({
      type: 'Feature',
      properties: { name },
      geometry: { type: 'Polygon', coordinates: [coords] }
    });
  });
  return feats;
}

// ── Stage 2: load original parcels ───────────────────────────────────────────

function loadOriginals(features) {
  // Clear everything
  STATE.origLG.clearLayers();
  STATE.boundaryLG.clearLayers();
  STATE.editLG.clearLayers();
  STATE.vertexLG.clearLayers();
  document.getElementById('vhandles').innerHTML = '';
  STATE.originalFeatures = [];
  STATE.editableParcels  = {};
  STATE.selectedIds      = new Set();
  STATE.lastSelectedId   = null;

  const allLatLngs = [];

  features.forEach((feat, i) => {
    const id   = generateId();
    const name = feat.properties?.name || `Parcel ${String.fromCharCode(65 + i)}`;
    const ring = feat.geometry.coordinates;
    const area = turf.area(feat);

    // Normalise the geojson so turf operations always work
    const geojson = turf.feature(
      { type: 'Polygon', coordinates: Array.isArray(ring[0][0]) ? ring : [ring] },
      { name }
    );

    STATE.originalFeatures.push({ id, name, area, geojson });

    const lls = coordsToLatLngs(geojson.geometry.coordinates);
    lls.forEach(ll => allLatLngs.push(ll));

    // Dashed grey semi-transparent reference polygon (not interactive)
    const poly = L.polygon(lls, {
      color: '#c0c0c0', weight: 1.5, dashArray: '6 5',
      fillColor: '#d8d8d8', fillOpacity: 0.08,
      interactive: false
    });

    poly.bindTooltip(name, {
      permanent: true, direction: 'center',
      className: 'orig-label'
    });

    STATE.origLG.addLayer(poly);
  });

  if (allLatLngs.length) {
    map.fitBounds(L.latLngBounds(allLatLngs), { padding: [50, 50] });
  }

  computeProjectBoundary();
  createEditableCopies();
}

// ── Stage 2: project boundary ─────────────────────────────────────────────────

function computeProjectBoundary() {
  STATE.boundaryLG.clearLayers();
  if (STATE.originalFeatures.length === 0) return;

  const fc   = turf.featureCollection(STATE.originalFeatures.map(o => o.geojson));
  const hull = turf.convex(fc);
  if (!hull) return;

  STATE.projectBoundaryGeojson = hull;
  STATE.projectArea            = turf.area(hull);

  const lls = coordsToLatLngs(hull.geometry.coordinates);
  STATE.boundaryLG.addLayer(L.polygon(lls, {
    color: '#111', weight: 2.5, dashArray: '9 6',
    fill: false, interactive: false
  }));
}

// ── Stage 2: create editable copies ──────────────────────────────────────────

function createEditableCopies() {
  STATE.editableParcels = {};
  STATE.originalFeatures.forEach(orig => {
    const id  = generateId();
    const lls = coordsToLatLngs(orig.geojson.geometry.coordinates);
    STATE.editableParcels[id] = {
      id,
      name:       orig.name,
      type:       'Private parcel',
      latlngs:    lls,
      originalId: orig.id
    };
  });
  refreshEditableLayer();
  computeStats();
}

// ── Stage 2: render editable layer ────────────────────────────────────────────

function refreshEditableLayer() {
  STATE.editLG.clearLayers();
  // Vertex handles remain managed by Stage 3 (selectPolygon / deselectAll)

  Object.values(STATE.editableParcels).forEach(parcel => {
    const style    = getTypeStyle(parcel.type);
    const selected = STATE.selectedIds.has(parcel.id);
    const poly     = L.polygon(parcel.latlngs, {
      ...style,
      weight:    selected ? 3 : 2,
      color:     selected ? '#e67e22' : style.color,
      dashArray: null
    });

    poly.bindTooltip(parcel.name, {
      permanent: true, direction: 'center',
      className: 'edit-label'
    });

    poly.on('mousedown', e => { L.DomEvent.stopPropagation(e); startParcelDrag(parcel.id, e.originalEvent); });
    poly.on('click',     e => { L.DomEvent.stopPropagation(e); if (_parcelJustDragged) { _parcelJustDragged = false; return; } handlePolygonClick(parcel.id, e); });
    poly.on('dblclick',  e => { L.DomEvent.stopPropagation(e); renameParcel(parcel.id); });
    poly._parcelId = parcel.id;
    STATE.editLG.addLayer(poly);
    if (STATE.activeTool === 'select') {
      const el = poly.getElement();
      if (el) el.style.cursor = 'move';
    }
  });
}

// ── Stage 2: rename (double-click on label) ───────────────────────────────────

function renameParcel(id) {
  const p = STATE.editableParcels[id];
  if (!p) return;
  const newName = prompt('Rename parcel:', p.name);
  if (newName && newName.trim() && newName.trim() !== p.name) {
    pushHistory();
    p.name = newName.trim();
    refreshEditableLayer();
    computeStats();
  }
}

const MAX_HISTORY  = 50;

// ── Stage 3: transient interaction state ─────────────────────────────────────
let dragState      = null;   // { id, idx } while dragging a vertex
let _vertexMarkers = [];     // ordered vertex markers for the selected polygon
let _closeMarker   = null;   // pulsing marker on first draw vertex (shown at 3+ verts)
let clickTimer     = null;   // debounce single vs double-click during drawing
let _justDragged        = false;  // suppresses map click immediately after a vertex drag
let _parcelJustDragged  = false;  // suppresses polygon click after a parcel body drag
let _snapTarget         = null;   // LatLng | null — nearest vertex within snap radius while drawing
let _snapMarker         = null;   // circleMarker shown at the snap target
let _pendingEdgeClick = null; // { id, edgeIdx, midLatLng } — set when edge midpoint is clicked
let _edgeOpState      = null; // { parcelId, edgeIdx, mode, highlightLine } — waiting for ref edge

// ── Stage 3: map click / dblclick / mousemove ─────────────────────────────────

function onMapClick(e) {
  if (_justDragged) { _justDragged = false; return; }
  if (document.getElementById('edge-popup').classList.contains('open')) { closeEdgePopup(); return; }
  if (_edgeOpState) {
    const ref = findNearestEdge(e.latlng);
    if (ref) applyEdgeOp(ref.parcelId, ref.edgeIdx); else cancelEdgeOp();
    return;
  }
  const isPolygon = STATE.activeTool === 'draw' || STATE.tracingMode;
  const isRoad    = STATE.activeTool === 'draw-road';
  if (isPolygon || isRoad) {
    // Close polygon if clicked within 15px of first vertex (polygon mode only, needs 3+ verts)
    if (isPolygon && STATE.drawVerts.length >= 3) {
      const firstPt = map.latLngToContainerPoint(STATE.drawVerts[0]);
      const clickPt = map.latLngToContainerPoint(e.latlng);
      if (firstPt.distanceTo(clickPt) <= SNAP_CLICK_PX) {
        if (clickTimer !== null) { clearTimeout(clickTimer); clickTimer = null; }
        finishDrawing();
        return;
      }
    }
    if (clickTimer !== null) return;
    const clickLL = findSnapVertex(e.latlng, null, SNAP_CLICK_PX) || e.latlng;
    clickTimer = setTimeout(() => { clickTimer = null; addDrawVertex(clickLL); }, 200);
  } else if (STATE.activeTool === 'select' || STATE.activeTool === 'delete') {
    deselectAll();
  }
}

function onMapDblClick(e) {
  if (STATE.activeTool === 'draw' || STATE.tracingMode) {
    L.DomEvent.stopPropagation(e);
    if (clickTimer !== null) { clearTimeout(clickTimer); clickTimer = null; }
    finishDrawing();
  } else if (STATE.activeTool === 'draw-road' && STATE.drawVerts.length >= 2) {
    L.DomEvent.stopPropagation(e);
    if (clickTimer !== null) { clearTimeout(clickTimer); clickTimer = null; }
    finishDrawing();
  }
}

function onMapMouseMove(e) {
  const drawing = STATE.activeTool === 'draw' || STATE.activeTool === 'draw-road' || STATE.tracingMode;
  if (drawing) {
    _snapTarget = findSnapVertex(e.latlng);
    updateSnapMarker(_snapTarget);
    if (STATE.drawVerts.length > 0) updateDrawPreview(_snapTarget || e.latlng);
  } else if (_snapMarker) {
    _snapTarget = null;
    updateSnapMarker(null);
  }
}

// ── Stage 3: snap ─────────────────────────────────────────────────────────────

const SNAP_PX       = 15; // hover indicator radius
const SNAP_CLICK_PX = 20; // larger tolerance used when snapping on actual clicks

// exclude: optional { parcelId, vertexIdx } — skips that specific vertex (used during vertex drag)
function findSnapVertex(latlng, exclude = null, radius = SNAP_PX) {
  const pt = map.latLngToContainerPoint(latlng);
  let best = null, bestDist = Infinity;

  Object.values(STATE.editableParcels).forEach(p =>
    p.latlngs.forEach((ll, i) => {
      if (exclude && p.id === exclude.parcelId && i === exclude.vertexIdx) return;
      const d = pt.distanceTo(map.latLngToContainerPoint(ll));
      if (d < radius && d < bestDist) { bestDist = d; best = ll; }
    })
  );
  STATE.originalFeatures.forEach(o =>
    o.geojson.geometry.coordinates[0].forEach(c => {
      const ll = L.latLng(c[1], c[0]);
      const d  = pt.distanceTo(map.latLngToContainerPoint(ll));
      if (d < radius && d < bestDist) { bestDist = d; best = ll; }
    })
  );
  STATE.drawVerts.forEach(ll => {
    const d = pt.distanceTo(map.latLngToContainerPoint(ll));
    if (d < radius && d < bestDist) { bestDist = d; best = ll; }
  });

  return best;
}

function updateSnapMarker(ll) {
  if (!ll) {
    if (_snapMarker) { _snapMarker.remove(); _snapMarker = null; }
    return;
  }
  if (!_snapMarker) {
    _snapMarker = L.circleMarker(ll, {
      radius: 7, color: '#3b82f6', weight: 2.5,
      fillColor: '#93c5fd', fillOpacity: 0.55, interactive: false
    }).addTo(map);
  } else {
    _snapMarker.setLatLng(ll);
  }
}

// ── Stage 3: drawing ──────────────────────────────────────────────────────────

function showCloseMarker() {
  removeCloseMarker();
  const firstVert = STATE.drawVerts[0];
  _closeMarker = L.circleMarker(firstVert, {
    radius: 10, color: '#27ae60', weight: 2.5,
    fillColor: '#27ae60', fillOpacity: 0.35, interactive: true
  });
  _closeMarker.bindTooltip('Click to close polygon', { direction: 'top', offset: [0, -8] });
  _closeMarker.on('click', e => {
    L.DomEvent.stopPropagation(e);
    if (clickTimer !== null) { clearTimeout(clickTimer); clickTimer = null; }
    finishDrawing();
  });
  _closeMarker.addTo(map);
  // Apply pulse class to the underlying SVG element
  setTimeout(() => {
    const el = _closeMarker.getElement();
    if (el) el.classList.add('close-pulse');
  }, 0);
}

function removeCloseMarker() {
  if (_closeMarker) { _closeMarker.remove(); _closeMarker = null; }
}

function addDrawVertex(latlng) {
  STATE.drawVerts.push(latlng);
  updateDrawPreview();
  if (STATE.drawVerts.length >= 3 && STATE.activeTool !== 'draw-road') showCloseMarker();
}

function updateDrawPreview(moveLatlng) {
  if (STATE.drawLine) { STATE.drawLine.remove(); STATE.drawLine = null; }
  const pts = [...STATE.drawVerts];
  if (moveLatlng) pts.push(moveLatlng);
  if (pts.length < 2) return;
  STATE.drawLine = L.polyline(pts, {
    color: '#e67e22', weight: 2, dashArray: '5 4', interactive: false
  }).addTo(map);
}

function cancelDraw() {
  if (clickTimer !== null) { clearTimeout(clickTimer); clickTimer = null; }
  if (STATE.drawLine) { STATE.drawLine.remove(); STATE.drawLine = null; }
  removeCloseMarker();
  updateSnapMarker(null);
  _snapTarget = null;
  STATE.drawVerts = [];
}

function finishDrawing() {
  const verts  = [...STATE.drawVerts];
  const isRoad = STATE.activeTool === 'draw-road';
  cancelDraw();

  if (isRoad) {
    if (verts.length < 2) return;
    openRoadDialog(verts);
  } else if (STATE.tracingMode) {
    if (verts.length < 3) return;
    addTracedOriginal(verts);
  } else {
    if (verts.length < 3) return;
    const autoName = `Parcel ${String.fromCharCode(65 + Object.keys(STATE.editableParcels).length)}`;
    openNameDialog(autoName, 'Private parcel', (name, type) => {
      pushHistory();
      const id = generateId();
      STATE.editableParcels[id] = { id, name, type, latlngs: verts, originalId: null };
      refreshEditableLayer();
      computeStats();
    });
  }
}

// ── Stage 3: name / type dialog ───────────────────────────────────────────────

function openNameDialog(defaultName, defaultType, callback) {
  document.getElementById('dlg-name').value = defaultName;
  document.getElementById('dlg-type').value = defaultType;
  document.getElementById('name-dialog').classList.add('open');

}

function confirmDialog() {

  const type = document.getElementById('dlg-type').value;
  document.getElementById('name-dialog').classList.remove('open');
  if (name && STATE.dialogResolve) {

}

function cancelDialog() {
  document.getElementById('name-dialog').classList.remove('open');
